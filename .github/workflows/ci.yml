name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run lint
      # Build before test: tests/cli/bare-invoke.test.ts execs `node dist/index.js`
      # so dist/ must exist. Locally `dist/` survives between runs; CI starts clean.
      - run: bun run build
      - run: bun run test
